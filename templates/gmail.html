<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
<table cellpadding="0" cellspacing="0" border="0" style="font-family: 'Titillium Web', Arial, sans-serif; font-size: 14px; color: #333333;">
  <tbody>
    <tr>
      <td style="vertical-align: top; padding-right: 20px;">
        <img src="https://signatures.groupe-speed.cloud/assets/images/cloudy.png" alt="Groupe Speed Cloud" width="100" height="100" style="display: block; border-radius: 16px;">
      </td>
      <td style="vertical-align: top; border-left: 3px solid #8a4dfd; padding-left: 20px;">
        <!-- Name & Job -->
        <table cellpadding="0" cellspacing="0" border="0" style="margin-bottom: 12px;">
          <tr>
            <td>
              <span style="font-size: 20px; font-weight: 700; color: #1a1a1a; display: block; margin-bottom: 2px;">{name}</span>
              <span style="font-size: 14px; color: #8a4dfd; font-weight: 600;">{job}</span>
            </td>
          </tr>
        </table>
        
        <!-- Contact Info -->
        <table cellpadding="0" cellspacing="0" border="0" style="font-size: 13px;">
          <tr>
            <td style="padding-bottom: 6px;">
              <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="vertical-align: middle; padding-right: 10px;">
                    <span style="display: inline-block; background-color: #8a4dfd; border-radius: 4px; width: 24px; height: 24px; text-align: center; line-height: 24px;">
                      <img src="https://signatures.groupe-speed.cloud/assets/images/email.png" alt="Email" width="14" height="14" style="vertical-align: middle;">
                    </span>
                  </td>
                  <td style="vertical-align: middle;">
                    <a href="mailto:{email}" style="color: #333333; text-decoration: none;">{email}</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding-bottom: 6px;">
              <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="vertical-align: middle; padding-right: 10px;">
                    <span style="display: inline-block; background-color: #8a4dfd; border-radius: 4px; width: 24px; height: 24px; text-align: center; line-height: 24px;">
                      <img src="https://signatures.groupe-speed.cloud/assets/images/link.png" alt="Web" width="14" height="14" style="vertical-align: middle;">
                    </span>
                  </td>
                  <td style="vertical-align: middle;">
                    <a href="https://groupe-speed.cloud" style="color: #333333; text-decoration: none;">groupe-speed.cloud</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td>
              <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td style="vertical-align: middle; padding-right: 10px;">
                    <span style="display: inline-block; background-color: #8a4dfd; border-radius: 4px; width: 24px; height: 24px; text-align: center; line-height: 24px;">
                      <img src="https://signatures.groupe-speed.cloud/assets/images/address.png" alt="Address" width="14" height="14" style="vertical-align: middle;">
                    </span>
                  </td>
                  <td style="vertical-align: middle;">
                    <a href="https://maps.app.goo.gl/DG8J3497zwgSWPuC6" style="color: #333333; text-decoration: none;">10 quai du Moulin, 08600 Givet</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
        
        <!-- Company -->
        <table cellpadding="0" cellspacing="0" border="0" style="margin-top: 12px;">
          <tr>
            <td>
              <span style="font-size: 11px; color: #888888;">Groupe Speed Cloud</span>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </tbody>
</table>
<script src="/assets/js/params.min.js"></script>
</body>
</html>
