<!DOCTYPE html>
<html xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <!--[if gte mso 9]>
  <xml>
    <o:OfficeDocumentSettings>
      <o:AllowPNG/>
      <o:PixelsPerInch>96</o:PixelsPerInch>
    </o:OfficeDocumentSettings>
  </xml>
  <![endif]-->
</head>
<body style="margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Arial, sans-serif;">
<!--[if mso]>
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0"><tr><td>
<![endif]-->

<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="font-family: 'Segoe UI', Tahoma, Arial, sans-serif; font-size: 14px; color: #333333; line-height: 1.4;">
  <tr>
    <td valign="top" style="padding-right: 16px;">
      <img src="https://signatures.groupe-speed.cloud/assets/images/cloudy.png" alt="Groupe Speed Cloud" width="90" height="90" style="display: block; border-radius: 12px;">
    </td>
    <td valign="top" style="border-left: 2px solid #8a4dfd; padding-left: 16px;">
      <!-- Name & Job -->
      <table role="presentation" cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td style="padding-bottom: 8px;">
            <span style="font-size: 17px; font-weight: bold; color: #1a1a1a; display: block; line-height: 1.2;">{name}</span>
            <span style="font-size: 13px; color: #8a4dfd; font-weight: 600; display: block; margin-top: 2px;">{job}</span>
          </td>
        </tr>
      </table>
      
      <!-- Separator -->
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="200">
        <tr><td style="border-bottom: 1px solid #e5e5e5; height: 1px; font-size: 1px;">&nbsp;</td></tr>
        <tr><td height="8"></td></tr>
      </table>
      
      <!-- Contact Info -->
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="font-size: 12px; color: #555555;">
        <tr>
          <td style="padding-bottom: 4px;">
            <a href="mailto:{email}" style="color: #555555; text-decoration: none;">{email}</a>
          </td>
        </tr>
        <tr>
          <td style="padding-bottom: 4px;">
            <a href="https://groupe-speed.cloud" style="color: #8a4dfd; text-decoration: none; font-weight: 600;">groupe-speed.cloud</a>
          </td>
        </tr>
        <tr>
          <td>
            <span style="color: #888888;">10 quai du Moulin, 08600 Givet</span>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>

<!--[if mso]>
</td></tr></table>
<![endif]-->
<script src="/assets/js/params.min.js"></script>
</body>
</html>
