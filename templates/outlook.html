<!DOCTYPE html>
<html xmlns:v="urn:schemas-microsoft-com:vml" xmlns:o="urn:schemas-microsoft-com:office:office">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <!--[if gte mso 9]>
  <xml>
    <o:OfficeDocumentSettings>
      <o:AllowPNG/>
      <o:PixelsPerInch>96</o:PixelsPerInch>
    </o:OfficeDocumentSettings>
  </xml>
  <![endif]-->
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    a { text-decoration: none; }
  </style>
</head>
<body style="margin: 0; padding: 0;">
<!--[if mso]>
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" border="0">
<tr><td>
<![endif]-->

<table role="presentation" cellpadding="0" cellspacing="0" border="0" style="font-family: 'Segoe UI', Tahoma, sans-serif; font-size: 14px; color: #333333; max-width: 500px;">
  <tr>
    <td valign="top" style="padding-right: 15px; width: 90px;">
      <!--[if gte mso 9]>
      <v:roundrect xmlns:v="urn:schemas-microsoft-com:vml" xmlns:w="urn:schemas-microsoft-com:office:word" style="width:80px;height:80px;" arcsize="20%" stroke="f" fillcolor="#ffffff">
        <v:fill type="frame" src="https://signatures.groupe-speed.cloud/assets/images/cloudy.png"/>
      </v:roundrect>
      <![endif]-->
      <!--[if !mso]><!-->
      <img src="https://signatures.groupe-speed.cloud/assets/images/cloudy.png" alt="Groupe Speed Cloud" width="80" height="80" style="display: block; border-radius: 12px;">
      <!--<![endif]-->
    </td>
    <td valign="top" style="border-left: 3px solid #8a4dfd; padding-left: 15px;">
      <!-- Name -->
      <table role="presentation" cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td style="padding-bottom: 2px;">
            <span style="font-size: 18px; font-weight: bold; color: #1a1a1a; line-height: 1.2;">{name}</span>
          </td>
        </tr>
        <tr>
          <td style="padding-bottom: 10px;">
            <span style="font-size: 13px; color: #8a4dfd; font-weight: 600;">{job}</span>
          </td>
        </tr>
      </table>
      
      <!-- Separator -->
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
        <tr>
          <td style="border-bottom: 1px solid #e0e0e0; padding-bottom: 10px; margin-bottom: 10px;"></td>
        </tr>
        <tr>
          <td height="10"></td>
        </tr>
      </table>
      
      <!-- Contact Info -->
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="font-size: 12px; color: #555555;">
        <!-- Email -->
        <tr>
          <td valign="middle" style="padding-right: 8px; padding-bottom: 5px; width: 20px;">
            <span style="display: inline-block; background-color: #8a4dfd; width: 20px; height: 20px; text-align: center; line-height: 20px; border-radius: 3px;">
              <img src="https://signatures.groupe-speed.cloud/assets/images/email.png" alt="" width="12" height="12" style="vertical-align: middle;">
            </span>
          </td>
          <td valign="middle" style="padding-bottom: 5px;">
            <a href="mailto:{email}" style="color: #333333; text-decoration: none;">{email}</a>
          </td>
        </tr>
        <!-- Website -->
        <tr>
          <td valign="middle" style="padding-right: 8px; padding-bottom: 5px; width: 20px;">
            <span style="display: inline-block; background-color: #8a4dfd; width: 20px; height: 20px; text-align: center; line-height: 20px; border-radius: 3px;">
              <img src="https://signatures.groupe-speed.cloud/assets/images/link.png" alt="" width="12" height="12" style="vertical-align: middle;">
            </span>
          </td>
          <td valign="middle" style="padding-bottom: 5px;">
            <a href="https://groupe-speed.cloud" style="color: #333333; text-decoration: none;">groupe-speed.cloud</a>
          </td>
        </tr>
        <!-- Address -->
        <tr>
          <td valign="middle" style="padding-right: 8px; width: 20px;">
            <span style="display: inline-block; background-color: #8a4dfd; width: 20px; height: 20px; text-align: center; line-height: 20px; border-radius: 3px;">
              <img src="https://signatures.groupe-speed.cloud/assets/images/address.png" alt="" width="12" height="12" style="vertical-align: middle;">
            </span>
          </td>
          <td valign="middle">
            <a href="https://maps.app.goo.gl/DG8J3497zwgSWPuC6" style="color: #333333; text-decoration: none;">10 quai du Moulin, 08600 Givet</a>
          </td>
        </tr>
      </table>
      
      <!-- Company footer -->
      <table role="presentation" cellpadding="0" cellspacing="0" border="0" style="margin-top: 12px;">
        <tr>
          <td>
            <span style="font-size: 10px; color: #999999;">Groupe Speed Cloud</span>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>

<!--[if mso]>
</td></tr></table>
<![endif]-->
<script src="/assets/js/params.min.js"></script>
</body>
</html>
